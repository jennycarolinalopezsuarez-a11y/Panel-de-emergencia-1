<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <title>PANEL DE EMERGENCIAS </title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="imagenes/logoFMT.jpg" type="image/jpg">
  <style>
    :root {
      --card: #dfdfe7;
      --fg: #1d232b;
      --muted: #6b7280;
      --bg: #ffffff;

      --red: #dc3545;
      --orange: #fd7e14;
      --blue: #0d6efd;
      --green: #198754;

      --radius: 16px;
      --shadow: 0 8px 24px rgba(0, 0, 0, .08);

    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--fg);
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }

    .toolbar,
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 18px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
    }

    .btn-connect {
      background: var(--muted);
    }

    .btn-fire {
      background: var(--red);
    }

    .btn-burn {
      background: var(--green);
    }

    .btn-homaq {
      background: var(--blue);
    }

    .btn-stop {
      background: #6c757d;
    }

    .btn-clear {
      background: #198754;
    }

    .status {
      font-size: 15px;
      color: var(--muted);
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .sector-btn {
      background: var(--red);
      color: #fff;
      padding: 16px;
      border-radius: 14px;
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
    }

    /* efecto al pasar el cursor */
    .sector-btn:hover {
      transform: scale(1.1);
      background: #b00000;
      box-shadow: 0 0 15px rgba(220, 53, 69, 0.7);
    }

    /* efecto al hacer click */
    .sector-btn:active {
      transform: scale(0.92);
    }

    /* transición suave (IMPORTANTE) */
    .sector-btn {
      transition: all 0.2s ease;
    }

    .hidden {
      display: none;
    }

    .alarm-box {
      margin-top: 8px;
      height: 140px;
      border-radius: 20px;
      background: #ffffff;
      /*boton de alarma*/
      border: 3px solid #F57100;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      color: #4d5968;
      transition: all .08s linear;
    }

    .alarm-box.on {
      background: #ff3b30;
      border-color: #b00000;
      color: #fff;
      box-shadow:
        0 0 18px rgba(255, 59, 48, .8),
        0 0 50px rgba(255, 59, 48, .45);
      transform: scale(1.01);
    }

    .alarm-subtitle {
      margin-top: 10px;
      min-height: 28px;
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      color: #2b3440;
    }

    .log {
      margin-top: 12px;
      background: #111827;
      color: #d1f7d6;
      border-radius: 12px;
      min-height: 180px;
      padding: 12px;
      font-family: Consolas, monospace;
      font-size: 13px;
      white-space: pre-wrap;
      overflow: auto;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      text-align: center;
    }

    h1 {
      position: relative;
      text-align: center;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }


    .logo {
      position: absolute;
      left: 10px;
      /* esquina izquierda */
      top: 50%;
      transform: translateY(-50%);
      width: 120px;
    }

    @media (max-width: 600px) {
      .logo {
        position: static;
        transform: none;
        display: block;
        margin: 0 auto 10px;
        width: 80px;
      }
    }

    h1 {
      flex-direction: column;
    }

    .footer {
      background: #F57100;
      color: #fff;
      text-align: center;
      padding: 15px;
      margin-top: 30px;
      font-size: 14px;
    }

    /* ANIMACIONES BOTONES */
    /* efecto al pasar el mouse */
    button {
      transition: all 0.2s ease;
    }

    button:hover {
      transform: scale(1.08);
      filter: brightness(1.1);
    }

    /* efecto al hacer click */
    button:active {
      transform: scale(0.95);
    }

    /* animación tipo "pulso" para botones importantes */
    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.6);
      }

      70% {
        box-shadow: 0 0 0 12px rgba(255, 0, 0, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(255, 0, 0, 0);
      }
    }

    /* aplicar pulso solo a botones críticos */
    .btn-fire {
      animation: pulse 2s infinite;
    }

    .btn-burn {
      animation: pulse 2.5s infinite;
    }

    .btn-homaq {
      animation: pulse 3s infinite;
    }

    #sectorCard h2 {
      text-align: center;
    }

    .card h2 {
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1><img src="imagenes/logoFMT2.jpg" alt="Logo" class="logo">
      Panel de Emergencias</h1>

    <div class="toolbar">
      <button class="btn-fire" id="btnFire">Incendio</button>
      <button class="btn-burn" id="btnBurn">Sísmico</button>
      <button class="btn-homaq" id="btnHomaq">HOMAQ</button>
      <button class="btn-stop" id="btnStop">Stop</button>
      <div class="status" id="status">Desconectado</div>
    </div>
  
    <div class="toolbar" id="toolbarSerial">
      <button class="btn-connect" id="btnConnect">Conectar Serial</button>
      <button class="btn-clear" id="btnClear">Limpiar log</button>
    </div>
    <div class="card hidden" id="sectorCard">
      <h2>Selecciona Sector de Incendio</h2>
      <div class="grid" id="sectorGrid"></div>
    </div>

    <div class="card">
      <h2>Indicador Visual Local</h2>
      
      <div class="alarm-box" id="alertBox">ALARMA</div>
      <div class="alarm-subtitle" id="alarmLabel">SIN EVENTO</div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <script>
    let port = null;
    let writer = null;
    let reader = null;
    let readLoopRunning = false;

    let alertBusy = false;
    let alertToken = 0;

    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const alertBox = document.getElementById("alertBox");
    const alarmLabel = document.getElementById("alarmLabel");
    const sectorCard = document.getElementById("sectorCard");
    const sectorGrid = document.getElementById("sectorGrid");

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent += `[${time}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function clearLog() {
      logEl.textContent = "";
      log("Log limpiado");
    }

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function setAlarmLabel(text) {
      alarmLabel.textContent = text;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function setBlinkState(on) {
      alertBox.classList.toggle("on", on);
    }

    function clearBlink() {
      setBlinkState(false);
    }

    function resetAlarmVisual() {
      clearBlink();
      setAlarmLabel("SIN EVENTO");
    }

    async function blink(onMs, offMs, times, tokenRef) {
      for (let i = 0; i < times; i++) {
        if (tokenRef !== alertToken) return;
        setBlinkState(true);
        await sleep(onMs);

        if (tokenRef !== alertToken) return;
        setBlinkState(false);
        await sleep(offMs);
      }
    }

    async function runFirePattern(sector, tokenRef) {
      setAlarmLabel(`INCENDIO - SECTOR ${sector}`);

      for (let rep = 0; rep < 2; rep++) {
        if (tokenRef !== alertToken) return;

        await blink(1600, 1600, 3, tokenRef);

        if (tokenRef !== alertToken) return;

        setBlinkState(false);
        await sleep(2500);

        if (tokenRef !== alertToken) return;

        await blink(700, 700, sector, tokenRef);
      }

      if (tokenRef === alertToken) resetAlarmVisual();
    }

    async function runBlastPattern(tokenRef) {
      setAlarmLabel("QUEMADA");

      for (let rep = 0; rep < 2; rep++) {
        const start = Date.now();

        while ((Date.now() - start) < 10000) {
          if (tokenRef !== alertToken) return;

          setBlinkState(true);
          await sleep(1000);

          if (tokenRef !== alertToken) return;

          setBlinkState(false);
          await sleep(1000);
        }
      }

      if (tokenRef === alertToken) resetAlarmVisual();
    }

    async function runHomaqPattern(tokenRef) {
      setAlarmLabel("HOMAQ");

      for (let rep = 0; rep < 2; rep++) {
        const start = Date.now();

        while ((Date.now() - start) < 10000) {
          if (tokenRef !== alertToken) return;

          setBlinkState(true);
          await sleep(500);

          if (tokenRef !== alertToken) return;

          setBlinkState(false);
          await sleep(500);
        }
      }

      if (tokenRef === alertToken) resetAlarmVisual();
    }

    async function ejecutarAlertaVisual(major, minor) {
      alertToken++;
      const myToken = alertToken;
      alertBusy = true;

      try {
        resetAlarmVisual();

        if (major === 100 && minor >= 1 && minor <= 9) {
          log(`Blink local: INCENDIO sector ${minor}`);
          await runFirePattern(minor, myToken);
        } else if (major === 200 && minor === 10) {
          log("Blink local: QUEMADA");
          await runBlastPattern(myToken);
        } else if (major === 300 && minor === 20) {
          log("Blink local: HOMAQ");
          await runHomaqPattern(myToken);
        } else {
          setAlarmLabel(`SIN PATRÓN ${major},${minor}`);
          log(`Sin patrón visual para ${major},${minor}`);
        }
      } finally {
        if (myToken === alertToken) {
          alertBusy = false;
          resetAlarmVisual();
        }
      }
    }

    function cancelarAlertaVisual() {
      alertToken++;
      alertBusy = false;
      resetAlarmVisual();
      log("Blink local detenido");
    }

    async function connectSerial() {
      try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });

        const encoder = new TextEncoderStream();
        encoder.readable.pipeTo(port.writable);
        writer = encoder.writable.getWriter();

        const decoder = new TextDecoderStream();
        port.readable.pipeTo(decoder.writable);
        reader = decoder.readable.getReader();

        setStatus("Conectado a 115200");
        log("Puerto serial conectado");
        readSerialLoop();
      } catch (err) {
        log("Error conectando serial: " + err.message);
      }
    }

    async function sendSerialLine(line) {
      if (!writer) {
        log("Serial no conectado");
        return false;
      }

      try {
        await writer.write(line + "\n");
        log("TX -> " + line);
        return true;
      } catch (err) {
        log("Error TX: " + err.message);
        return false;
      }
    }

    async function readSerialLoop() {
      if (!reader || readLoopRunning) return;
      readLoopRunning = true;

      let buffer = "";

      try {
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          if (!value) continue;

          buffer += value;

          let idx;
          while ((idx = buffer.indexOf("\n")) >= 0) {
            const line = buffer.slice(0, idx).replace(/\r/g, "").trim();
            buffer = buffer.slice(idx + 1);

            if (line) log("RX <- " + line);
          }
        }
      } catch (err) {
        log("Error RX: " + err.message);
      } finally {
        readLoopRunning = false;
      }
    }

    async function lanzarComando(major, minor) {
      const cmd = `${major},${minor}`;
      const ok = await sendSerialLine(cmd);
      if (!ok) return;

      await ejecutarAlertaVisual(major, minor);
    }

    document.getElementById("btnConnect").addEventListener("click", async () => {
      if (!("serial" in navigator)) {
        alert("Tu navegador no soporta Web Serial. Usa Chrome o Edge.");
        return;
      }
      await connectSerial();
    });

    document.getElementById("btnFire").addEventListener("click", () => {
      sectorCard.classList.remove("hidden");
      log("Selecciona sector para INCENDIO");
    });

    document.getElementById("btnBurn").addEventListener("click", async () => {
      sectorCard.classList.add("hidden");
      await lanzarComando(200, 10);
    });

    document.getElementById("btnHomaq").addEventListener("click", async () => {
      sectorCard.classList.add("hidden");
      await lanzarComando(300, 20);
    });

    document.getElementById("btnStop").addEventListener("click", async () => {
      sectorCard.classList.add("hidden");
      await sendSerialLine("stop");
      cancelarAlertaVisual();
    });

    document.getElementById("btnClear").addEventListener("click", () => {
      clearLog();
    });

    for (let i = 1; i <= 9; i++) {
      const btn = document.createElement("div");
      btn.className = "sector-btn";
      btn.textContent = `Sector ${i}`;
      btn.addEventListener("click", async () => {
        sectorCard.classList.add("hidden");
        await lanzarComando(100, i);
      });
      sectorGrid.appendChild(btn);
    }

    resetAlarmVisual();

    /* OCULTAR LOS BOTONES AL CONECTAR SERIAL */
    /* toda esta funcion es para ocultar y aparecer los botones del panel de emergencia*/
    async function connectSerial() {
  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });

    const encoder = new TextEncoderStream();
    encoder.readable.pipeTo(port.writable);
    writer = encoder.writable.getWriter();

    const decoder = new TextDecoderStream();
    port.readable.pipeTo(decoder.writable);
    reader = decoder.readable.getReader();

    const toolbarSerial = document.getElementById("toolbarSerial");
    const alarmLabel = document.getElementById("alarmLabel"); // SIN EVENTO
    const logEl = document.getElementById("log");             // Log de respuesta

    setStatus("Conectado a 115200");
    log("Puerto serial conectado");

    /* 🔥 OCULTAR BOTONES Y SIN EVENTO */
    toolbarSerial.style.display = "none"; // Botones Conectar/Limpiar
    alarmLabel.style.display = "none";    // Subtítulo SIN EVENTO
    logEl.style.display = "none";         // Caja de log

    readSerialLoop();

  } catch (err) {
    log("Error conectando serial: " + err.message);
  }
}

/* Botón STOP */
document.getElementById("btnStop").addEventListener("click", async () => {
  const toolbarSerial = document.getElementById("toolbarSerial");
  const alarmLabel = document.getElementById("alarmLabel");
  const logEl = document.getElementById("log");

  sectorCard.classList.add("hidden");
  await sendSerialLine("stop");
  cancelarAlertaVisual();

  /* 🔥 MOSTRAR BOTONES Y SIN EVENTO */
  toolbarSerial.style.display = "flex";
  alarmLabel.style.display = "block";
  logEl.style.display = "block";
});
  </script>
</body>
